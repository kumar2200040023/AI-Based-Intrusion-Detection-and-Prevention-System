version: "3.9"

services:
  # ── API Server ──
  api:
    build: .
    container_name: antigravity-api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo
    volumes:
      - ./saved_models:/app/saved_models
      - ./logs:/app/logs
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000

  # ── Dashboard ──
  dashboard:
    build: .
    container_name: antigravity-dashboard
    ports:
      - "8501:8501"
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - api
    volumes:
      - ./saved_models:/app/saved_models
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

  # ── MongoDB ──
  mongo:
    image: mongo:7
    container_name: antigravity-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Kafka (optional) ──
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: antigravity-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    profiles:
      - streaming

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: antigravity-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    profiles:
      - streaming

volumes:
  mongo_data:
